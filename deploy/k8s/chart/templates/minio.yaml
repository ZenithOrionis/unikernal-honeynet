{{- if .Values.minio.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "honeynet.fullname" . }}-minio
  labels:
    {{- include "honeynet.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: minio
      app.kubernetes.io/name: {{ include "honeynet.name" . }}
  template:
    metadata:
      labels:
        {{- include "honeynet.labels" . | nindent 8 }}
        app.kubernetes.io/component: minio
    spec:
      containers:
        - name: minio
          image: {{ .Values.minio.image | quote }}
          args: ["server", "/data"]
          env:
            - name: MINIO_ROOT_USER
              value: {{ .Values.minio.accessKey | quote }}
            - name: MINIO_ROOT_PASSWORD
              value: {{ .Values.minio.secretKey | quote }}
          ports:
            - containerPort: 9000
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "honeynet.fullname" . }}-minio
  labels:
    {{- include "honeynet.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/component: minio
    app.kubernetes.io/name: {{ include "honeynet.name" . }}
  ports:
    - name: api
      port: 9000
      targetPort: 9000
{{- end }}
