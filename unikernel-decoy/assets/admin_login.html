<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{TITLE}}</title>
    <style>
      body {
        margin: 0;
        font-family: "Trebuchet MS", sans-serif;
        background: linear-gradient(180deg, #f4f4f8, #dde2eb);
        color: #202634;
      }
      main {
        max-width: 520px;
        margin: 60px auto;
        background: #ffffff;
        border-radius: 18px;
        padding: 30px;
        border: 1px solid #cfd4df;
        box-shadow: 0 16px 34px rgba(32, 38, 52, 0.1);
      }
      .meta {
        color: #5f6676;
        margin-bottom: 10px;
      }
      input {
        width: 100%;
        padding: 10px 12px;
        margin-top: 6px;
        border-radius: 10px;
        border: 1px solid #c8cedb;
      }
      button {
        background: #304d78;
        color: #fff;
        border: 0;
        border-radius: 10px;
        padding: 10px 14px;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="meta">{{SERVICE_LABEL}} :: {{HOSTNAME}}</div>
      <h1>{{BANNER}}</h1>
      {{NOTICE}}
      <p>Use your operations credentials to unlock restricted administrative tooling.</p>
      <form method="post" action="/login">
        <label>Account <input name="username" type="text"></label><br><br>
        <label>Password <input name="password" type="password"></label><br><br>
        <button type="submit">Continue</button>
      </form>
    </main>
  </body>
</html>
