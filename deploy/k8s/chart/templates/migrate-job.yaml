{{- if .Values.migrations.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "honeynet.fullname" . }}-migrate
  labels:
    {{- include "honeynet.labels" . | nindent 4 }}
spec:
  template:
    metadata:
      labels:
        {{- include "honeynet.labels" . | nindent 8 }}
        app.kubernetes.io/component: migrate
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -lc
            - until nc -z {{ include "honeynet.fullname" . }}-postgres 5432; do echo waiting for postgres; sleep 2; done
      containers:
        - name: migrate
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          command:
            - sh
            - -lc
            - alembic -c ingest_api/alembic.ini upgrade head
          env:
            - name: HONEYPOT_ENVIRONMENT
              value: {{ .Values.env.environment | quote }}
            - name: HONEYPOT_WEB_ORIGIN
              value: {{ .Values.env.webOrigin | quote }}
            - name: HONEYPOT_RETENTION_DAYS
              value: {{ .Values.env.retentionDays | quote }}
            - name: HONEYPOT_OIDC_ISSUER_URL
              value: {{ .Values.api.oidcIssuerUrl | quote }}
            - name: HONEYPOT_OIDC_AUDIENCE
              value: {{ .Values.api.oidcAudience | quote }}
            - name: HONEYPOT_INGEST_API_KEY
              value: {{ .Values.api.ingressApiKey | quote }}
            - name: HONEYPOT_ANALYST_BEARER_TOKEN
              value: {{ .Values.api.analystBearerToken | quote }}
            - name: HONEYPOT_DATABASE_URL
              value: {{ printf "postgresql+psycopg://%s:%s@%s-postgres:5432/%s" .Values.postgres.username .Values.postgres.password (include "honeynet.fullname" .) .Values.postgres.database | quote }}
{{- end }}
